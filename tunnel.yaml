# tunnel.yaml
# ─────────────────────────────────────────────────────────────────────────────
# This configuration bridges your dotMCP tunnel daemon to the cloud-hosted
# Hugging Face Space (SSE). 
#
# When dotMCP requests a tool execution, it goes through the tunnel daemon
# on your laptop, but instead of running the server locally, it uses
# 'supergateway' to proxy the request directly to Hugging Face Spaces (SSE).
#
# Compute / Playwright / FFmpeg runs on Hugging Face (zero laptop resource usage).
# ─────────────────────────────────────────────────────────────────────────────

key: "dott_139f0d079fde20e2f91e2a23c31e2092c1c4723dff30210259806efcd0d43c8d"
servers:
  - id: "2fa07eb8128d455083d5bc4f0ca6b0e6"
    command: "cmd.exe"
    args:
      - "/c"
      - "npx"
      - "-y"
      - "supergateway"
      - "--sse"
      - "https://mechreaper007x-clip-a-canvas-mcp.hf.space/sse"
      - "--logLevel"
      - "none"
